<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>細胞繁殖大挑戰 - 想辦法留下更多的子代吧</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    /* 防止選取文字造成操作不順 */
    .no-select { user-select: none; }
  </style>
</head>
<body class="bg-slate-50">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示元件 ---
    const Icon = ({ name, className }) => {
      const icons = {
        Dna: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10 16 1.5 1.5"/><path d="m14 8-1.5-1.5"/><path d="M15 2c-1.798 1.154-3 3.179-3 5.5V14c0 2.56-1.11 4.71-2.853 6"/><path d="m17 2c1.798 1.154 3 3.179 3 5.5V14c0 2.56 1.11 4.71 2.853 6"/><path d="M2 10c1.798-1.154 3-3.179 3-5.5V2"/><path d="M4 22c-1.798-1.154-3-3.179-3-5.5V10"/><path d="m7 20 1.5-1.5"/><path d="m8 12 4 4"/><path d="m9 8 4 4"/><path d="m11 4 1.5 1.5"/></svg>,
        Users: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        Activity: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,
        Skull: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></svg>,
        AlertTriangle: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
        RefreshCw: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
        CheckCircle2: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
        XCircle: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>,
        Info: <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      };
      return icons[name] || null;
    };

    // --- 核心邏輯：加入豐富的生物實例 ---
    const REPRODUCTION_CARDS = [
      // 有性生殖 (5種)
      { name: '青蛙 - 卵生 (體外受精)', type: 'sexual' },
      { name: '雞 - 卵生 (體內受精)', type: 'sexual' },
      { name: '人類 - 胎生 (懷孕生子)', type: 'sexual' },
      { name: '蘋果樹 - 種子繁殖 (開花結果)', type: 'sexual' },
      { name: '向日葵 - 種子繁殖', type: 'sexual' },
      
      // 無性生殖 (11種)
      { name: '草履蟲 - 分裂生殖', type: 'asexual' },
      { name: '變形蟲 - 分裂生殖', type: 'asexual' },
      { name: '水螅 - 出芽生殖', type: 'asexual' },
      { name: '酵母菌 - 出芽生殖', type: 'asexual' },
      { name: '渦蟲 - 斷裂生殖', type: 'asexual' },
      { name: '水綿 - 斷裂生殖', type: 'asexual' },
      { name: '黴菌 - 孢子繁殖', type: 'asexual' },
      { name: '蘭花 - 組織培養', type: 'asexual' },
      { name: '地瓜 - 營養器官繁殖 (根)', type: 'asexual' },
      { name: '馬鈴薯 - 營養器官繁殖 (莖)', type: 'asexual' },
      { name: '落地生根 - 營養器官繁殖 (葉)', type: 'asexual' }
    ];

    const generateRandomGenotype = () => {
      const alleles = [['A', 'a'], ['B', 'b'], ['C', 'c']];
      let genotype = '';
      alleles.forEach(pair => {
        const first = pair[Math.floor(Math.random() * 2)];
        const second = pair[Math.floor(Math.random() * 2)];
        genotype += [first, second].sort().join('');
      });
      return genotype;
    };

    // 繪製染色體的視覺化元件
    const ChromosomeDisplay = ({ genotype }) => {
      const pairs = [
        { alleles: [genotype[0], genotype[1]], color: 'bg-red-400' },
        { alleles: [genotype[2], genotype[3]], color: 'bg-blue-400' },
        { alleles: [genotype[4], genotype[5]], color: 'bg-green-400' }
      ];

      return (
        <div className="flex justify-center gap-3 my-3 no-select">
          {pairs.map((pair, pairIdx) => (
            <div key={pairIdx} className="flex gap-1 p-1 bg-white/50 rounded-lg border border-slate-100">
              {pair.alleles.map((allele, idx) => (
                <div key={idx} className="flex flex-col items-center">
                  <div className={`w-3 h-10 rounded-full ${pair.color} shadow-sm relative flex items-center justify-center opacity-85`}>
                     <div className="w-full h-1 bg-white/60"></div>
                  </div>
                  <div className="h-6 flex items-end justify-center mt-1">
                    <span className={`font-mono leading-none ${
                      allele === allele.toUpperCase() 
                        ? 'text-[16px] font-black text-slate-900' 
                        : 'text-[12px] font-bold text-slate-500 mb-[1px]'
                    }`}>
                      {allele}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    };

    function CellDashboard() {
      const [cells, setCells] = useState([]);
      const [cellCounter, setCellCounter] = useState(1);
      const [selectedCellId, setSelectedCellId] = useState(null);
      const [errorCount, setErrorCount] = useState(0);
      
      const [currentCard, setCurrentCard] = useState(null);
      const [reproductionPhase, setReproductionPhase] = useState('idle');
      const [message, setMessage] = useState({ text: '系統已就緒，請選擇一顆細胞開始繁衍。', type: 'info' });
      
      const [asexualInput, setAsexualInput] = useState('');
      const [myGamete, setMyGamete] = useState('');
      const [partnerGamete, setPartnerGamete] = useState('');
      const [disasterCode, setDisasterCode] = useState('');

      useEffect(() => {
        setCells([{
          id: 1,
          genotype: generateRandomGenotype(),
          isAlive: true,
          generation: 1
        }]);
        setCellCounter(2);
      }, []);

      const showMessage = (text, type = 'info') => {
        setMessage({ text, type });
      };

      const resetReproductionState = () => {
        setCurrentCard(null);
        setReproductionPhase('idle');
        setAsexualInput('');
        setMyGamete('');
        setPartnerGamete('');
      };

      // 抽卡邏輯優化：確保 5:2 機率
      const drawCard = () => {
        // 設定 5:2 的大比例抽卡機率 (無性約 71.4%, 有性約 28.6%)
        const isAsexual = Math.random() < (5/7);
        const targetType = isAsexual ? 'asexual' : 'sexual';
        
        // 從對應的卡池中隨機挑選一張
        const pool = REPRODUCTION_CARDS.filter(c => c.type === targetType);
        const selectedCard = pool[Math.floor(Math.random() * pool.length)];
        
        setCurrentCard(selectedCard);
        setReproductionPhase('card_drawn');
        setAsexualInput('');
        setMyGamete('');
        setPartnerGamete('');
        showMessage('請判斷你抽到的生殖方式屬於哪一種？', 'info');
      };

      const guessMode = (guessedType) => {
        if (guessedType === currentCard.type) {
          setReproductionPhase('mode_selected');
          showMessage(`判斷正確！這是屬於${guessedType === 'asexual' ? '無性' : '有性'}生殖。請輸入子代資訊。`, 'success');
        } else {
          setErrorCount(prev => prev + 1);
          showMessage(`判斷錯誤！請再想想這個過程有沒有精卵（配子）結合？`, 'error');
        }
      };

      const cancelReproduction = () => {
        resetReproductionState();
        showMessage('已取消生殖動作，請重新選擇細胞。', 'info');
      };

      const spawnChild = (genotype) => {
        const parentGeneration = cells.find(c => c.id === selectedCellId)?.generation || 0;
        const newCell = {
          id: cellCounter,
          genotype: genotype,
          isAlive: true,
          generation: parentGeneration + 1
        };
        setCells([...cells, newCell]);
        setCellCounter(cellCounter + 1);
        
        resetReproductionState();
        showMessage(`成功繁衍！獲得新細胞。請重新選擇細胞進行下一輪繁殖。`, 'success');
      };

      const handleAsexualSubmit = () => {
        const parent = cells.find(c => c.id === selectedCellId);
        if (asexualInput.trim() === parent.genotype) {
          spawnChild(parent.genotype);
        } else {
          setErrorCount(prev => prev + 1);
          showMessage(`錯誤！無性生殖的子代基因型必須與母細胞完全相同！`, 'error');
        }
      };

      const isValidGamete = (gamete, parentGenotype) => {
        if (gamete.length !== 3) return false;
        const p1 = parentGenotype.slice(0, 2);
        const p2 = parentGenotype.slice(2, 4);
        const p3 = parentGenotype.slice(4, 6);
        return p1.includes(gamete[0]) && p2.includes(gamete[1]) && p3.includes(gamete[2]);
      };

      const handleSexualSubmit = () => {
        const parent = cells.find(c => c.id === selectedCellId);
        
        if (!isValidGamete(myGamete, parent.genotype)) {
          setErrorCount(prev => prev + 1);
          showMessage(`你的配子錯誤！必須從母細胞 (${parent.genotype}) 的每對染色體中各取一條 (例如: A, b, C)。`, 'error');
          return;
        }

        if (!/^[Aa][Bb][Cc]$/.test(partnerGamete)) {
          setErrorCount(prev => prev + 1);
          showMessage(`同學的配子格式錯誤！請確認他給的是包含 A/a, B/b, C/c 各一條的配子。`, 'error');
          return;
        }

        const combinedGenotype = 
          [myGamete[0], partnerGamete[0]].sort().join('') +
          [myGamete[1], partnerGamete[1]].sort().join('') +
          [myGamete[2], partnerGamete[2]].sort().join('');
        
        spawnChild(combinedGenotype);
      };

      const executeDisaster = () => {
        const code = disasterCode.trim();
        
        if (!code.toLowerCase().startsWith('kill')) {
          setErrorCount(prev => prev + 1);
          showMessage('無效的災難代碼！格式應如 killaa 或 killAa', 'error');
          return;
        }
        
        const targetTrait = code.substring(4);
        if (!targetTrait) return;

        let killCount = 0;
        const updatedCells = cells.map(cell => {
          if (cell.isAlive && cell.genotype.includes(targetTrait)) {
            killCount++;
            return { ...cell, isAlive: false };
          }
          return cell;
        });

        setCells(updatedCells);
        setDisasterCode('');
        
        if (selectedCellId) {
           const selected = updatedCells.find(c => c.id === selectedCellId);
           if (selected && !selected.isAlive) {
               setSelectedCellId(null);
               resetReproductionState();
           }
        }

        if (killCount > 0) {
          showMessage(`環境衝擊！有 ${killCount} 顆帶有 ${targetTrait} 的細胞無法適應而死亡。`, 'error');
        } else {
          showMessage(`環境衝擊！你的細胞幸運地全都存活了下來。`, 'success');
        }
      };

      const selectedCell = cells.find(c => c.id === selectedCellId);
      const aliveCellsCount = cells.filter(c => c.isAlive).length;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 p-6 font-sans">
          <div className="max-w-5xl mx-auto space-y-6">
            
            {/* 頂部標題與統計 */}
            <header className="bg-white rounded-xl shadow-sm p-6 flex justify-between items-center border border-slate-200">
              <div>
                <h1 className="text-2xl font-black text-indigo-700 flex items-center gap-3">
                  <Icon name="Users" className="w-8 h-8 flex-shrink-0" />
                  細胞繁殖大挑戰
                </h1>
                <p className="text-slate-500 mt-2 font-bold">
                  想辦法留下更多的子代吧！ 
                  <span className="text-sm font-normal text-slate-400 ml-2">選定細胞 → 抽生殖卡 → 延續族群</span>
                </p>
              </div>
              <div className="flex gap-8 text-right">
                <div>
                  <div className="text-3xl font-black text-red-500">{errorCount}</div>
                  <div className="text-sm text-slate-500 font-medium">失誤次數</div>
                </div>
                <div>
                  <div className="text-3xl font-black text-indigo-600">{aliveCellsCount}</div>
                  <div className="text-sm text-slate-500 font-medium">存活總數</div>
                </div>
              </div>
            </header>

            {/* 訊息提示區 (常駐) */}
            <div className={`p-5 rounded-xl flex items-start gap-4 font-medium transition-all shadow-sm border-l-4 ${
              message.type === 'error' ? 'bg-red-50 text-red-800 border-red-500' : 
              message.type === 'success' ? 'bg-green-50 text-green-800 border-green-500' : 
              'bg-blue-50 text-blue-800 border-blue-500'
            }`}>
              <div className="mt-1">
                {message.type === 'error' ? <Icon name="XCircle" className="w-7 h-7 text-red-600" /> : 
                 message.type === 'success' ? <Icon name="CheckCircle2" className="w-7 h-7 text-green-600" /> : 
                 <Icon name="Info" className="w-7 h-7 text-blue-600" />}
              </div>
              <div>
                <div className={`text-xs font-black tracking-widest mb-1 ${
                  message.type === 'error' ? 'text-red-500' : 
                  message.type === 'success' ? 'text-green-600' : 'text-blue-500'
                }`}>系統訊息</div>
                <div className="text-lg">{message.text}</div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* 左側：細胞庫 */}
              <div className="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                  <Icon name="Activity" className="w-5 h-5 text-indigo-500"/>
                  你的細胞庫
                </h2>
                
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                  {cells.map(cell => (
                    <div 
                      key={cell.id}
                      onClick={() => {
                        if (cell.isAlive) {
                          setSelectedCellId(cell.id);
                          if(reproductionPhase !== 'idle') resetReproductionState();
                        }
                      }}
                      className={`
                        relative p-4 rounded-xl border-2 transition-all cursor-pointer
                        ${!cell.isAlive ? 'bg-slate-100 border-slate-200 grayscale opacity-60 cursor-not-allowed' : 
                          selectedCellId === cell.id ? 'bg-indigo-50 border-indigo-500 shadow-md transform scale-105' : 
                          'bg-white border-slate-200 hover:border-indigo-300 hover:shadow-sm'}
                      `}
                    >
                      {!cell.isAlive && (
                        <div className="absolute inset-0 flex items-center justify-center z-10">
                          <Icon name="Skull" className="w-16 h-16 text-slate-600 opacity-60 drop-shadow-lg" />
                        </div>
                      )}
                      <div className="text-xs text-slate-500 font-bold mb-1">
                        第 {cell.generation} 代 | 細胞 #{cell.id}
                      </div>
                      
                      {/* 染色體圖形 */}
                      <ChromosomeDisplay genotype={cell.genotype} />
                      
                      <div className="text-xs text-center text-slate-400 mt-2 font-bold">
                        {cell.isAlive ? '狀態：存活' : '狀態：已死亡'}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* 右側：行動與災難控制區 */}
              <div className="space-y-6">
                
                {/* 繁衍行動區 */}
                <div className="bg-white rounded-xl shadow-sm border border-indigo-200 p-6">
                  <h2 className="text-lg font-bold mb-4 text-indigo-800">繁衍控制台</h2>
                  
                  {!selectedCell ? (
                    <div className="text-center py-8 text-slate-400 border-2 border-dashed border-slate-200 rounded-lg">
                      請先從左側選擇一顆存活的細胞
                    </div>
                  ) : (
                    <div className="space-y-4">
                      <div className="bg-indigo-50 p-3 rounded-lg border border-indigo-100 mb-4 flex justify-between items-center">
                        <div className="text-xs text-indigo-500 font-bold">目前選定細胞</div>
                        <div className="font-mono font-black text-lg text-indigo-800">#{selectedCell.id} ({selectedCell.genotype})</div>
                      </div>

                      {reproductionPhase === 'idle' && (
                        <div className="space-y-3">
                          <button 
                            onClick={drawCard}
                            className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold flex items-center justify-center gap-2 transition-colors shadow-sm"
                          >
                            <Icon name="RefreshCw" className="w-5 h-5" />
                            抽取生殖卡
                          </button>
                          
                          <button 
                            onClick={() => {
                              setCurrentCard({ name: '接受配對', type: 'sexual' });
                              setReproductionPhase('mode_selected');
                              showMessage('請輸入你分離的配子，以及同學提供給你的配子，來產生子代。', 'info');
                            }}
                            className="w-full py-2 bg-pink-50 hover:bg-pink-100 text-pink-600 border border-pink-200 rounded-lg font-bold flex items-center justify-center gap-2 transition-colors"
                          >
                            🤝 接受同學配對 (有性生殖)
                          </button>
                        </div>
                      )}

                      {reproductionPhase === 'card_drawn' && (
                        <div className="bg-yellow-50 border border-yellow-200 p-4 rounded-lg space-y-4">
                          <div className="text-center">
                            <span className="text-sm text-yellow-700 font-bold">你抽到了</span>
                            <div className="text-xl font-black text-yellow-800 my-2">{currentCard.name}</div>
                            <span className="text-xs text-yellow-600">請判斷這屬於哪一種生殖方式並執行：</span>
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <button onClick={() => guessMode('asexual')} className="py-2 bg-white border-2 border-slate-300 hover:border-indigo-500 hover:bg-indigo-50 rounded-lg font-bold text-slate-700 text-sm transition-all shadow-sm">
                              細胞分裂 (無性)
                            </button>
                            <button onClick={() => guessMode('sexual')} className="py-2 bg-white border-2 border-slate-300 hover:border-indigo-500 hover:bg-indigo-50 rounded-lg font-bold text-slate-700 text-sm transition-all shadow-sm">
                              減數分裂 (有性)
                            </button>
                          </div>
                          <button onClick={cancelReproduction} className="w-full text-sm text-slate-400 hover:text-slate-600 mt-2">取消動作</button>
                        </div>
                      )}

                      {reproductionPhase === 'mode_selected' && currentCard.type === 'asexual' && (
                        <div className="space-y-3">
                          <div className="text-sm font-bold text-slate-700">執行細胞分裂 (複製)</div>
                          <input 
                            type="text" 
                            value={asexualInput}
                            onChange={(e) => setAsexualInput(e.target.value)}
                            placeholder="請輸入子代的基因型" 
                            className="w-full p-3 border-2 border-slate-200 rounded-lg focus:border-indigo-500 outline-none font-mono text-center tracking-widest text-lg"
                          />
                          <button onClick={handleAsexualSubmit} className="w-full py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-bold shadow-sm">產生子代</button>
                          <button onClick={cancelReproduction} className="w-full text-sm text-slate-400 hover:text-slate-600">取消</button>
                        </div>
                      )}

                      {reproductionPhase === 'mode_selected' && currentCard.type === 'sexual' && (
                        <div className="space-y-3">
                          <div className="text-sm font-bold text-slate-700">
                            {currentCard.name === '接受配對' ? '協助同學進行有性生殖' : '執行減數分裂與受精'}
                          </div>
                          <div className="space-y-2">
                            <div>
                              <label className="text-xs text-slate-500 block mb-1 font-bold">你的配子 (從母細胞分離)</label>
                              <input 
                                type="text" 
                                value={myGamete}
                                onChange={(e) => setMyGamete(e.target.value)}
                                placeholder="例如: AbC" 
                                className="w-full p-2 border-2 border-slate-200 rounded-lg focus:border-indigo-500 outline-none font-mono text-center tracking-widest"
                              />
                            </div>
                            <div>
                              <label className="text-xs text-slate-500 block mb-1 font-bold">同學的配子 (請找一位同學要)</label>
                              <input 
                                type="text" 
                                value={partnerGamete}
                                onChange={(e) => setPartnerGamete(e.target.value)}
                                placeholder="例如: aBc" 
                                className="w-full p-2 border-2 border-slate-200 rounded-lg focus:border-indigo-500 outline-none font-mono text-center tracking-widest"
                              />
                            </div>
                          </div>
                          <button onClick={handleSexualSubmit} className="w-full py-2 bg-pink-600 hover:bg-pink-700 text-white rounded-lg font-bold shadow-sm">結合並產生子代</button>
                          <button onClick={cancelReproduction} className="w-full text-sm text-slate-400 hover:text-slate-600">取消</button>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {/* 環境災難區 */}
                <div className="bg-slate-800 rounded-xl shadow-sm border border-slate-700 p-6 text-white">
                  <h2 className="text-lg font-bold mb-2 flex items-center gap-2 text-red-400">
                    <Icon name="AlertTriangle" className="w-5 h-5"/>
                    環境壓力測試
                  </h2>
                  <p className="text-xs text-slate-400 mb-4">當老師宣佈災難發生時，請輸入代碼來篩選你的細胞群落 (區分大小寫，例: killaa, killAa)。</p>
                  <div className="flex gap-2">
                    <input 
                      type="text" 
                      value={disasterCode}
                      onChange={(e) => setDisasterCode(e.target.value)}
                      placeholder="輸入代碼 (例: killaa)" 
                      className="flex-1 p-2 bg-slate-900 border border-slate-600 rounded-lg text-white placeholder-slate-500 outline-none focus:border-red-400 font-mono text-sm"
                    />
                    <button 
                      onClick={executeDisaster}
                      className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-sm transition-colors"
                    >
                      執行
                    </button>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CellDashboard />);
  </script>
</body>
</html>
